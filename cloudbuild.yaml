steps:
  # 이전 이미지 풀 (캐시용, 실패해도 계속 진행)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['pull', 'gcr.io/$PROJECT_ID/self-disruption:latest']
    allowFailure: true

  # Docker 이미지 빌드 (이전 이미지를 캐시로 활용)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/self-disruption:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/self-disruption:$_TAG'
      - '-t'
      - 'gcr.io/$PROJECT_ID/self-disruption:latest'
      - '.'

  # Container Registry에 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/self-disruption:$_TAG']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/self-disruption:latest']

  # Cloud Run 배포 (Direct VPC egress + NAT 적용)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'self-disruption'
      - '--image'
      - 'gcr.io/$PROJECT_ID/self-disruption:$_TAG'
      - '--region'
      - 'asia-northeast3'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--network=default'
      - '--subnet=default'
      - '--vpc-egress=all-traffic'

images:
  - 'gcr.io/$PROJECT_ID/self-disruption:$_TAG'
  - 'gcr.io/$PROJECT_ID/self-disruption:latest'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _TAG: 'manual'
