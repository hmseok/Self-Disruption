name: Deploy to ride-care-manager EC2

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '_docs/**'
      - 'harness-engineering/**'
      - '**.test.ts'
      - '**.test.tsx'

jobs:
  deploy-dev:
    # Self-Disruption (hmseok/Self-Disruption) 에서는 skip — ride-care-manager 만 실행
    if: github.repository == 'Ride-IT/ride-care-manager'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: SSH 배포 + 빌드 + PM2 reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 25m
          command_timeout: 25m
          script: |
            set -e
            cd /opt/ride-care-manager

            echo "── 1. git pull ──"
            git pull origin main

            echo "── 2. npm install ──"
            npm install

            echo "── 3. prisma generate ──"
            npx prisma generate

            echo "── 4. next build (Turbopack, swap 활용) ──"
            export NODE_OPTIONS="--max-old-space-size=2048"
            npm run build

            echo "── 5. PM2 reload (무중단) ──"
            pm2 reload ride-care-manager
            pm2 save

            echo "── 6. 상태 확인 ──"
            pm2 status ride-care-manager
            sleep 3
            curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:3001

            echo "✅ 배포 완료"
